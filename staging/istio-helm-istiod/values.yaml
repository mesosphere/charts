# D2iQ Istio Istiod Chart Values

global:
  # Used by istiod templates as fallback when pilot.hub/tag not set
  hub: docker.io/istio
  tag: 1.30.2
  imagePullPolicy: IfNotPresent
  istioNamespace: istio-system
  priorityClassName: "dkp-critical-priority"

# Istiod component configuration
istiod:
  enabled: true
  autoscaleEnabled: true
  autoscaleMin: 2
  autoscaleMax: 2
  cni:
    enabled: true

# Grafana dashboards
grafana:
  enabled: true

# Prometheus Operator ServiceMonitors
prometheus:
  enabled: true

prometheus-operator:
  serviceMonitor:
    labels: {}

# Security (certificate management)
security:
  enabled: true
  issuerName: kommander-ca
  image: docker.io/mesosphere/kubectl
  tag: v1.35.0-alpine

apiVersion: v2
name: istio-helm-base
version: 1.25.0
# appVersion = the vendored Istio version. hack/istio-helm-upgrade/upgrade.sh
# reads this as the version to upgrade *from* and bumps it automatically; keep it
# accurate and in lockstep across all istio-helm-* wrappers.
appVersion: 1.29.0
description: Helm chart for deploying Istio base resources and CRDs
keywords:
  - istio
  - istio-base
  - crds
sources:
  - https://github.com/istio/istio/tree/master/manifests/charts/base
icon: https://istio.io/latest/favicons/android-192x192.png
maintainers:
  - name: rohitkumar0510
dependencies:
  - name: base
    version: 1.29.0
    condition: base.enabled

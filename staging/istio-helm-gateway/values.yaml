# Gateway component configuration
gateway:
  enabled: true
  name: istio-ingressgateway
  proxy:
    # "auto" will be populated at runtime by the mutating webhook.
    image: auto
  priorityClassName: ""
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 2
  labels:
    istio: ingressgateway
  additional_gateways: []

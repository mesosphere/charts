# Gateway component configuration
#
# This chart supports two mutually exclusive modes:
#
# 1. Single gateway (subchart mode — backward compatible, DEFAULT):
#    Set gateway.enabled=true and configure under "gateway:" key.
#    This uses the upstream Istio gateway subchart directly.
#    The "gateways" array MUST be empty ([]) in this mode.
#
# 2. Multiple gateways (array mode):
#    Set gateway.enabled=false and configure the "gateways:" array.
#    This provides parity with how the Istio Operator supported multiple gateways (ingress, egress).
#
# Using both simultaneously will produce a configuration error.

# --- Single gateway subchart mode (DEFAULT) ---
gateway:
  enabled: true
  name: istio-ingressgateway
  proxy:
    # "auto" means image is populated by mutating webhook at runtime
    image: auto
  priorityClassName: ""
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 2
  labels:
    istio: ingressgateway

# --- Default values for gateways array entries ---
# Each gateway entry is deep-merged on top of these defaults.
# Gateway-specific values override defaults. Only specify what differs per gateway.
# These defaults are ONLY used when the "gateways" array mode is active.
gatewayDefaults:
  # Gateway proxy image configuration
  # "auto" will be populated at runtime by the mutating webhook.
  proxy:
    image: auto
  kind: Deployment
  revision: ""
  replicaCount: null
  rbac:
    enabled: true
  serviceAccount:
    create: true
    annotations: {}
    name: ""
  podAnnotations:
    prometheus.io/port: "15020"
    prometheus.io/scrape: "true"
    prometheus.io/path: "/stats/prometheus"
    inject.istio.io/templates: "gateway"
    sidecar.istio.io/inject: "true"
  securityContext: {}
  containerSecurityContext: {}
  service:
    type: LoadBalancer
    ports:
    - name: status-port
      port: 15021
      protocol: TCP
      targetPort: 15021
    - name: http2
      port: 80
      protocol: TCP
      targetPort: 80
    - name: https
      port: 443
      protocol: TCP
      targetPort: 443
    annotations: {}
    loadBalancerIP: ""
    loadBalancerSourceRanges: []
    externalTrafficPolicy: ""
    externalIPs: []
    ipFamilyPolicy: ""
    ipFamilies: []
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 2000m
      memory: 1024Mi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: {}
    autoscaleBehavior: {}
  env: {}
  labels: {}
  annotations: {}
  nodeSelector: {}
  tolerations: []
  topologySpreadConstraints: []
  affinity: {}
  networkGateway: ""
  imagePullPolicy: ""
  imagePullSecrets: []
  podDisruptionBudget: {}
  terminationGracePeriodSeconds: 30
  volumes: []
  volumeMounts: []
  priorityClassName: ""

# --- Multiple gateways configuration (array mode) ---
# To use this mode, set gateway.enabled=false above and add entries here.
# Each entry creates a full set of gateway resources (Deployment, Service, HPA, ServiceAccount, Role, PDB).
# This provides parity with how the Istio Operator supported multiple ingress/egress gateways
# from a single values override.
#
# Each gateway entry supports all fields from gatewayDefaults above.
# Only fields that differ from gatewayDefaults need to be specified.
#
# Example with both ingress and egress gateways:
#
# gateway:
#   enabled: false       # MUST disable subchart when using gateways array
#
# gateways:
#   - name: istio-ingressgateway
#     enabled: true
#     revision: "istio-helm"
#     labels:
#       istio: ingressgateway
#     service:
#       type: LoadBalancer
#       ports:
#         - name: status-port
#           port: 15021
#           targetPort: 15021
#           protocol: TCP
#         - name: http2
#           port: 80
#           targetPort: 8080
#           protocol: TCP
#         - name: https
#           port: 443
#           targetPort: 8443
#           protocol: TCP
#     autoscaling:
#       enabled: true
#       minReplicas: 2
#       maxReplicas: 5
#
#   - name: istio-egressgateway
#     enabled: true
#     revision: "istio-helm"
#     labels:
#       istio: egressgateway
#     service:
#       type: ClusterIP
#       ports:
#         - name: http2
#           port: 80
#           targetPort: 8080
#           protocol: TCP
#         - name: https
#           port: 443
#           targetPort: 8443
#           protocol: TCP
#     autoscaling:
#       enabled: true
#       minReplicas: 1
#       maxReplicas: 3
gateways: []

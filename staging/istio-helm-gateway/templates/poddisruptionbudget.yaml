{{- if .Values.gateways }}
{{- range .Values.gateways }}
{{- if .enabled }}
{{- $gw := mustMergeOverwrite (deepCopy $.Values.gatewayDefaults) . }}
{{- $ctx := dict "gw" $gw "Chart" $.Chart "Release" $.Release }}
{{- if $gw.podDisruptionBudget }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $gw.name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "gateways.labels" $ctx | nindent 4 }}
spec:
  selector:
    matchLabels:
  {{- include "gateways.selectorLabels" $ctx | nindent 6 }}
  {{- with $gw.podDisruptionBudget }}
    {{- toYaml . | nindent 2 }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

{{- if not (eq .Values.service.type "None") }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gateway.name" . }}
  namespace: {{ default .Release.Namespace }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
    {{- with .Values.networkGateway }}
    topology.istio.io/network: "{{.}}"
    {{- end }}
  annotations:
    {{- merge (deepCopy .Values.service.annotations) .Values.annotations | toYaml | nindent 4 }}
spec:
{{- with .Values.service.loadBalancerIP }}
  loadBalancerIP: "{{ . }}"
{{- end }}
{{- if eq .Values.service.type "LoadBalancer" }}
  {{- if hasKey .Values.service "allocateLoadBalancerNodePorts" }}
  allocateLoadBalancerNodePorts: {{ .Values.service.allocateLoadBalancerNodePorts }}
  {{- end }}
{{- end }}
{{- if .Values.service.ipFamilyPolicy }}
  ipFamilyPolicy: {{ .Values.service.ipFamilyPolicy }}
{{- end }}
{{- if .Values.service.ipFamilies }}
  ipFamilies:
{{- range .Values.service.ipFamilies }}
  - {{ . }}
{{- end }}
{{- end }}
{{- with .Values.service.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
{{ toYaml . | indent 4 }}
{{- end }}
{{- with .Values.service.externalTrafficPolicy }}
  externalTrafficPolicy: "{{ . }}"
{{- end }}
  type: {{ .Values.service.type }}
  ports:
{{- if .Values.networkGateway }}
  - name: status-port
    port: 15021
    targetPort: 15021
  - name: tls
    port: 15443
    targetPort: 15443
  - name: tls-istiod
    port: 15012
    targetPort: 15012
  - name: tls-webhook
    port: 15017
    targetPort: 15017
{{- else }}
{{ .Values.service.ports | toYaml | indent 4 }}
{{- end }}
{{- if .Values.service.externalIPs }}
  externalIPs: {{- range .Values.service.externalIPs }}
    - {{.}}
  {{- end }}
{{- end }}
  selector:
    {{- include "gateway.selectorLabels" . | nindent 4 }}
{{- end }}
{{/* --- Additional gateways --- */}}
{{- if $.Values.additional_gateways }}
{{- range $.Values.additional_gateways }}
{{- if or (not (hasKey . "enabled")) .enabled }}
{{- $defaults := deepCopy $.Values }}
{{- $_ := unset $defaults "enabled" }}
{{- $_ := unset $defaults "additional_gateways" }}
{{- $_ := unset $defaults "global" }}
{{- $gw := mustMergeOverwrite $defaults . }}
{{- $ctx := dict "gw" $gw "Chart" $.Chart "Release" $.Release }}
{{- if not (eq $gw.service.type "None") }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $gw.name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "additional.gateway.labels" $ctx | nindent 4 }}
    {{- with $gw.networkGateway }}
    topology.istio.io/network: "{{.}}"
    {{- end }}
  annotations:
    {{- merge (deepCopy $gw.service.annotations) $gw.annotations | toYaml | nindent 4 }}
spec:
{{- with $gw.service.loadBalancerIP }}
  loadBalancerIP: "{{ . }}"
{{- end }}
{{- if eq $gw.service.type "LoadBalancer" }}
  {{- if hasKey $gw.service "allocateLoadBalancerNodePorts" }}
  allocateLoadBalancerNodePorts: {{ $gw.service.allocateLoadBalancerNodePorts }}
  {{- end }}
{{- end }}
{{- if $gw.service.ipFamilyPolicy }}
  ipFamilyPolicy: {{ $gw.service.ipFamilyPolicy }}
{{- end }}
{{- if $gw.service.ipFamilies }}
  ipFamilies:
{{- range $gw.service.ipFamilies }}
  - {{ . }}
{{- end }}
{{- end }}
{{- with $gw.service.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
{{ toYaml . | indent 4 }}
{{- end }}
{{- with $gw.service.externalTrafficPolicy }}
  externalTrafficPolicy: "{{ . }}"
{{- end }}
  type: {{ $gw.service.type }}
  ports:
{{- if $gw.networkGateway }}
  - name: status-port
    port: 15021
    targetPort: 15021
  - name: tls
    port: 15443
    targetPort: 15443
  - name: tls-istiod
    port: 15012
    targetPort: 15012
  - name: tls-webhook
    port: 15017
    targetPort: 15017
{{- else }}
{{ $gw.service.ports | toYaml | indent 4 }}
{{- end }}
{{- if $gw.service.externalIPs }}
  externalIPs: {{- range $gw.service.externalIPs }}
    - {{.}}
  {{- end }}
{{- end }}
  selector:
    {{- include "additional.gateway.selectorLabels" $ctx | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

{{- if .Values.podDisruptionBudget }}
# a workaround for https://github.com/kubernetes/kubernetes/issues/93476
{{- if or (and .Values.autoscaling.enabled  (gt (int .Values.autoscaling.minReplicas) 1)) (and (not .Values.autoscaling.enabled) (gt (int .Values.replicaCount) 1)) }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "gateway.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "gateway.name" . }}
    {{- include "istio.labels" . | nindent 4}}
    {{- include "gateway.labels" . | nindent 4}}
spec:
  selector:
    matchLabels:
  {{- include "gateway.selectorLabels" . | nindent 6 }}
  {{- with .Values.podDisruptionBudget }}
    {{- toYaml . | nindent 2 }}
  {{- end }}
{{- end }}
{{- end }}
{{/* --- Additional gateways --- */}}
{{- if $.Values.additional_gateways }}
{{- range $.Values.additional_gateways }}
{{- if or (not (hasKey . "enabled")) .enabled }}
{{- $defaults := deepCopy $.Values }}
{{- $_ := unset $defaults "enabled" }}
{{- $_ := unset $defaults "additional_gateways" }}
{{- $_ := unset $defaults "global" }}
{{- $gw := mustMergeOverwrite $defaults . }}
{{- $ctx := dict "gw" $gw "Chart" $.Chart "Release" $.Release }}
{{- if $gw.podDisruptionBudget }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $gw.name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "additional.gateway.labels" $ctx | nindent 4 }}
spec:
  selector:
    matchLabels:
  {{- include "additional.gateway.selectorLabels" $ctx | nindent 6 }}
  {{- with $gw.podDisruptionBudget }}
    {{- toYaml . | nindent 2 }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

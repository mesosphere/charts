apiVersion: v1
kind: Pod
metadata:
  name: etcd-metrics-listen-fixer-REPLACE_TAG
  namespace: kube-system
  labels:
    app.kubernetes.io/managed-by: chaos-prep
    app.kubernetes.io/component: etcd-metrics-listen-fixer
spec:
  restartPolicy: Never
  nodeName: REPLACE_NODE
  hostNetwork: false
  hostPID: false
  tolerations:
    - {key: node-role.kubernetes.io/control-plane, operator: Exists, effect: NoSchedule}
    - {key: node-role.kubernetes.io/master,        operator: Exists, effect: NoSchedule}
  containers:
    - name: fixer
      image: alpine:3.20
      imagePullPolicy: IfNotPresent
      securityContext:
        privileged: true
        runAsUser: 0
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -eu
          M=/host-manifests/etcd.yaml

          # Show current flag
          echo "[$(date -u +%H:%M:%SZ)] BEFORE:"
          grep -- '--listen-metrics-urls' "$M" || echo "  (flag missing)"

          # Idempotency: already correct?
          if grep -q -- '--listen-metrics-urls=http://0.0.0.0:2381' "$M"; then
            echo "[$(date -u +%H:%M:%SZ)] already listening on 0.0.0.0:2381; nothing to do"
            exit 0
          fi

          # Dot-prefix backup so kubelet doesn't pick it up as a competing manifest
          B=/host-manifests/.etcd.yaml.bak.$(date -u +%Y%m%d-%H%M%SZ)
          cp -a "$M" "$B"
          echo "[$(date -u +%H:%M:%SZ)] backup written to $B"

          # Edit into a tempfile in the same dir, then atomic mv (so kubelet sees
          # a single self-consistent manifest write event).
          T=$(mktemp /host-manifests/.etcd.yaml.tmp.XXXXXX)
          sed 's|--listen-metrics-urls=http://127.0.0.1:2381|--listen-metrics-urls=http://0.0.0.0:2381|' "$M" > "$T"

          # Verify the new file actually has the desired flag
          if ! grep -q -- '--listen-metrics-urls=http://0.0.0.0:2381' "$T"; then
            echo "[$(date -u +%H:%M:%SZ)] ERROR: sed did not produce the expected flag; aborting"
            cat "$T" | grep listen-metrics-urls || true
            rm -f "$T"
            exit 1
          fi

          # Atomic swap
          mv -f "$T" "$M"

          echo "[$(date -u +%H:%M:%SZ)] AFTER:"
          grep -- '--listen-metrics-urls' "$M"

          echo "[$(date -u +%H:%M:%SZ)] kubelet will detect the manifest change and restart etcd within ~5-10s"
      volumeMounts:
        - name: manifests
          mountPath: /host-manifests
  volumes:
    - name: manifests
      hostPath:
        path: /etc/kubernetes/manifests
        type: Directory

{{- if .Values.quotaBumper.enabled -}}
# ============================================================================
# RBAC for the etcd-quota-bumper per-node Jobs.
#
# Distinct from the defrag/snapshot ServiceAccount because the quota-bumper
# has a DIFFERENT, narrower trust profile:
#
#   * pods (get/list)         — read .status.containerStatuses[].containerID
#                               and .status.containerStatuses[].ready on the
#                               etcd static pod for THIS node so we can
#                               detect the kubelet-driven restart (Ghost
#                               Health Check mitigation). Also read
#                               .spec.containers[0].command to assert the
#                               new --quota-backend-bytes flag was applied.
#
#   * pods/exec (create)      — `kubectl exec etcd-<node> -- etcdctl …`
#                               We deliberately do NOT bake etcdctl into the
#                               Job image; we reuse the one already inside
#                               the etcd pod itself, with its own PKI.
#
#   * nodes (get/list)        — only the orchestrator uses this from outside
#                               the cluster, but the Job's SA carries the
#                               same permission so a self-contained,
#                               in-cluster orchestrator variant can be added
#                               later without an RBAC change.
#
# NOT granted (by design):
#   * any verbs on jobs / configmaps / secrets — the Job itself never
#     mutates Kubernetes objects, only the host filesystem on its own
#     node. Mutation rights stay with the orchestrator's (admin) kubeconfig.
# ============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: etcd-quota-bumper-sa
  namespace: kube-system
  labels:
    app.kubernetes.io/name: nkp-etcd-maintenance
    app.kubernetes.io/component: quota-bumper
    app.kubernetes.io/part-of: nkp-etcd-maintenance
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ include "nkp-etcd-maintenance.chart" . }}
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: etcd-quota-bumper-role
  labels:
    app.kubernetes.io/name: nkp-etcd-maintenance
    app.kubernetes.io/component: quota-bumper
    app.kubernetes.io/part-of: nkp-etcd-maintenance
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ include "nkp-etcd-maintenance.chart" . }}
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
# Each `rules[]` entry is `apiGroups` × `resources` × `verbs`.
# Empty apiGroup ("") = core API objects (pods, nodes, configmaps, …).
# Verbs are HTTP-verb equivalents: get/list (read), watch (stream),
# create/update/patch (write), delete (remove), * (everything).
rules:
  # Read Pods so the verify-restart script can inspect the etcd
  # static pod's containerID + ready flag.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # `pods/exec` is a "subresource" — granting it lets the SA open
  # an exec channel into a pod (equivalent to `kubectl exec`).
  # `create` is the verb the API server checks; there is no
  # separate "exec" verb.
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  # Node read access lets the orchestrator (and any future
  # in-cluster orchestrator variant) iterate control-plane nodes
  # without an extra RBAC change.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
# ClusterRoleBinding glues the SA to the ClusterRole. Without it
# the rules above grant nothing.
kind: ClusterRoleBinding
metadata:
  name: etcd-quota-bumper-rolebinding
  labels:
    app.kubernetes.io/name: nkp-etcd-maintenance
    app.kubernetes.io/component: quota-bumper
    app.kubernetes.io/part-of: nkp-etcd-maintenance
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ include "nkp-etcd-maintenance.chart" . }}
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
# `roleRef` = which ClusterRole's rules we want to grant.
# Once created, it is IMMUTABLE — to change, delete + recreate.
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: etcd-quota-bumper-role
# `subjects` = who receives those rules. Here, exactly one SA
# (etcd-quota-bumper-sa in kube-system). Pods using this SA will
# present a token that the API server resolves to this identity.
subjects:
  - kind: ServiceAccount
    name: etcd-quota-bumper-sa
    namespace: kube-system
{{- end }}

{{- if .Values.quotaBumper.enabled -}}
# ============================================================================
# ConfigMap that ships the three per-node Job scripts:
#
#   record-current-id.sh  (init #1)  — capture pre-patch containerID
#   patch-manifest.sh     (init #2)  — backup + yq-patch /etc/kubernetes/
#                                       manifests/etcd.yaml atomically
#   verify-restart.sh     (main)     — wait for restart, prove quorum
#
# Scripts are kept as standalone files under files/quota-bumper/ and pulled
# in here via .Files.Get so they remain readable / diff-able / shellcheck-
# able on disk. Editing the ConfigMap in-cluster will be reverted on the
# next `helm upgrade`; treat the files under files/quota-bumper/ as the
# source of truth.
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: etcd-quota-bumper-scripts
  namespace: kube-system
  labels:
    app.kubernetes.io/name: nkp-etcd-maintenance
    app.kubernetes.io/component: quota-bumper
    app.kubernetes.io/part-of: nkp-etcd-maintenance
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ include "nkp-etcd-maintenance.chart" . }}
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
data:
  record-current-id.sh: |
{{ .Files.Get "files/quota-bumper/record-current-id.sh" | indent 4 }}
  patch-manifest.sh: |
{{ .Files.Get "files/quota-bumper/patch-manifest.sh" | indent 4 }}
  verify-restart.sh: |
{{ .Files.Get "files/quota-bumper/verify-restart.sh" | indent 4 }}
{{- end }}

apiVersion: v2
name: istio-helm-cni
version: 1.25.0
# appVersion = the vendored Istio version. hack/istio-helm-upgrade/upgrade.sh
# reads this as the version to upgrade *from* and bumps it automatically; keep it
# accurate and in lockstep across all istio-helm-* wrappers.
appVersion: 1.29.0
description: Helm chart for deploying Istio CNI plugin
keywords:
  - istio
  - istio-cni
  - cni
sources:
  - https://github.com/istio/istio/tree/master/manifests/charts/istio-cni
icon: https://istio.io/latest/favicons/android-192x192.png
maintainers:
  - name: rohitkumar0510
dependencies:
  - name: cni
    version: 1.29.0
    condition: cni.enabled

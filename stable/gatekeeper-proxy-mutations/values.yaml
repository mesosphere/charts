mutations:
  # proxy settings
  podProxySettings:
    noProxy:
    httpProxy:
    httpsProxy:
  # apply mutations on objects whose labels match namespace labels
  namespaceSelectorForProxy: {}
  # disable the following namespaces
  excludeNamespacesFromProxy: []
  # Ship a default Assign mutation that sets pod-level
  # spec.securityContext.seccompProfile.type=RuntimeDefault on Pods that do not
  # already specify a seccompProfile. Mitigates the DirtyFrag CVE family
  # (CVE-2026-43284, CVE-2026-43500). A MustNotExist pathTest preserves any
  # explicit Unconfined / Localhost choice. Opt out per-namespace or per-pod by
  # setting the configured label (default kommander.d2iq.io/disable-default-seccomp)
  # to "true".
  defaultSeccompProfile:
    enabled: true
    optOutLabel: kommander.d2iq.io/disable-default-seccomp

# Copied from gatekeeper values
disableMutation: false

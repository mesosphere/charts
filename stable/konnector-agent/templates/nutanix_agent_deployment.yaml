{{- if eq .Values.agent.image.privateRegistry true}}
apiVersion: v1
kind: Secret
metadata:
  name: nutanix-k8s-agent-pull-secret
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ .Values.agent.image.imageCredentials.dockerconfig }}
{{- end }}
---
{{- if not .Values.prismCredentialsSecretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.prismCredentialsSecretName | default (printf "%s-prism-credentials" .Release.Name) }}
  namespace: {{ (include "k8s-agent.namespace" .) | quote }}
type: kubernetes.io/basic-auth
data:
  username: {{ required "pc.username is required when prismCredentialsSecretName is not set" .Values.pc.username | b64enc}}
  password: {{ required "pc.password is required when prismCredentialsSecretName is not set" .Values.pc.password | b64enc}}
{{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.agent.name }}
  namespace: {{ (include "k8s-agent.namespace" .) | quote }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.agent.name }}
  namespace: {{ (include "k8s-agent.namespace" .) | quote }}
rules:
- apiGroups:
  - '*'
  resources:
  - '*'
  verbs:
  - '*'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.agent.name }}
  namespace: {{ (include "k8s-agent.namespace" .) | quote }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.agent.name }}
subjects:
- kind: ServiceAccount
  name: {{ .Values.agent.name }}
  namespace: {{ (include "k8s-agent.namespace" .) | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.agent.name }}
  namespace: {{ (include "k8s-agent.namespace" .) | quote }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.agent.name }} # This deployment applies to any Pods matching the specified label
  template: # This deployment will create a set of pods using the configurations in this template
    metadata:
      labels: # The labels that will be applied to all of the pods in this deployment
        app: {{ .Values.agent.name }}
    spec: # Spec for the container which will run in the Pod
      {{- if eq .Values.agent.image.privateRegistry true}}
      imagePullSecrets:
      - name: nutanix-k8s-agent-pull-secret
      {{- end }}
      securityContext:
        runAsUser: 9999
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: {{ .Values.agent.name }}
      initContainers:
      - name: onboarding-container
        image: "{{ .Values.agent.image.repository }}/{{ .Values.agent.image.name }}:{{ .Values.agent.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
        command: ["/k8s-agent/k8s-agent"]
        env:
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
        volumeMounts:
          - name: pc-creds-volume
            mountPath: /certs
            readOnly: true
          {{- if or .Values.createAdditionalTrustBundleConfigMap (ne .Values.additionalTrustBundleConfigMapName "") }}
          - name: additional-trust-bundle-volume
            mountPath: /ca-certificate
            readOnly: true
          {{- end }}            
        args:
          [
            "--chart-hook=pre-install",
            "--pc-endpoint={{ required "Endpoint is required" .Values.pc.endpoint }}",
            "--pc-port={{ .Values.pc.port }}",
            "--insecure={{ .Values.pc.insecure }}",
            "--k8s-cluster-name={{ required "Name of kubernetes cluster is required" .Values.k8sClusterName }}",
            "--k8s-distribution={{ required "Kubernetes distribution is required" .Values.k8sDistribution }}",
            "--k8s-cluster-category={{ .Values.categoryMappings }}",
            "--update-config-in-min={{ .Values.agent.updateConfigInMin }}",
            "--update-metrics-in-min={{ .Values.agent.updateMetricsInMin }}",
          ]
        securityContext:
          runAsUser: 9999
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
              - ALL
      containers:
        - name: {{ .Values.agent.name }}
          image: "{{ .Values.agent.image.repository }}/{{ .Values.agent.image.name }}:{{ .Values.agent.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          command: ["/k8s-agent/k8s-agent"]
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: pc-creds-volume
              mountPath: /certs
              readOnly: true
            {{- if or .Values.createAdditionalTrustBundleConfigMap (ne .Values.additionalTrustBundleConfigMapName "") }}
            - name: additional-trust-bundle-volume
              mountPath: /ca-certificate
              readOnly: true
            {{- end }}
          args:
            [
              "--pc-endpoint={{ required "Endpoint is required" .Values.pc.endpoint }}",
              "--pc-port={{ .Values.pc.port }}",
              "--insecure={{ .Values.pc.insecure }}",
              "--k8s-cluster-name={{ required "Name of kubernetes cluster is required" .Values.k8sClusterName }}",
              "--k8s-distribution={{ required "Kubernetes distribution is required" .Values.k8sDistribution }}",
              "--k8s-cluster-category={{ .Values.categoryMappings }}",
              "--update-config-in-min={{ .Values.agent.updateConfigInMin }}",
              "--update-metrics-in-min={{ .Values.agent.updateMetricsInMin }}",            
              "--kubeconfig-upload-enabled={{ .Values.kubeconfigUpload.enabled }}",
              {{- if .Values.kubeconfigUpload.enabled }}
              "--control-plane-endpoint={{ required "Control plane endpoint is required when kubeconfigUpload is enabled" .Values.kubeconfigUpload.controlPlaneEndpoint }}",
              "--flow-rbac-configmap-name={{ .Values.kubeconfigUpload.flowConfigMapName }}",
              "--flow-rbac-configmap-namespace={{ .Values.kubeconfigUpload.flowConfigMapNamespace }}",
              "--flow-rbac-label-selector={{ .Values.kubeconfigUpload.flowLabelSelector }}",
              "--flow-rbac-clusterrole-key={{ .Values.kubeconfigUpload.clusterRoleKey }}",
              "--flow-kubeconfig-sa-name={{ .Values.kubeconfigUpload.serviceAccountName }}",
              {{- end }}
            ]
          ports:
            - containerPort: {{ .Values.agent.port }} # Should match the port number that the Go application listens on
          livenessProbe: # To check the health of the Pod
            httpGet:
              path: /health
              port: {{ .Values.agent.port }}
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe: # To check if the Pod is ready to serve traffic or not
            httpGet:
              path: /readiness
              port: {{ .Values.agent.port }}
              scheme: HTTP
            initialDelaySeconds: 5
            timeoutSeconds: 1
          resources:
            requests:
              memory: "128Mi"
              cpu: "120m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          securityContext:
            runAsUser: 9999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
      volumes:
        - name: pc-creds-volume
          secret:
            secretName: {{ .Values.prismCredentialsSecretName | default (printf "%s-prism-credentials" .Release.Name) }}
        {{- if or .Values.createAdditionalTrustBundleConfigMap (ne .Values.additionalTrustBundleConfigMapName "") }}
        - name: additional-trust-bundle-volume
          configMap:
            name: {{ .Values.additionalTrustBundleConfigMapName | default "ntnx-additional-trust-bundle-konnector-agent" }}
            items:
              - key: ca.crt
                path: ca.crt
        {{- end }}
---
{{- if .Values.createAdditionalTrustBundleConfigMap }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.additionalTrustBundleConfigMapName | default "ntnx-additional-trust-bundle-konnector-agent" }}
  namespace: {{ (include "k8s-agent.namespace" .) | quote }}
data:
  ca.crt: {{ required "Additional trust bundle is required" .Values.pc.additionalTrustBundle }}
{{- end }}
